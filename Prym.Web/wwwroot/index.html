    <!-- Early theme application — reads localStorage before Blazor boots to prevent a theme flash.
         NOTE: This must remain an inline <head> script because app-interop.js is loaded in <body>
         and is not available this early. The logic is intentionally kept minimal (only data-theme);
         the full Syncfusion CSS swap is deferred to the app-interop.js call below. -->
    <script>
        (function () {
            var STORAGE_KEY = 'eventforge-theme';
            var DEFAULT = 'carbon-neon-light';
            var VALID = ['carbon-neon-dark', 'carbon-neon-light'];
            try {
                var stored = localStorage.getItem(STORAGE_KEY);
                if (stored === 'dark') stored = 'carbon-neon-dark';
                if (stored === 'light') stored = 'carbon-neon-light';
                var theme = (stored && VALID.indexOf(stored) >= 0) ? stored : DEFAULT;
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { /* localStorage unavailable */ }
        })();
    </script>

    <!-- Dynamic Branding Script - Load and apply branding configuration -->
    <script>
        (function() {
            // Function to load and apply branding
            async function loadBranding() {
                try {
                    const response = await fetch('/api/v1/branding');
                    if (response.ok) {
                        const branding = await response.json();
                        
                        // Update favicon
                        const favicon = document.getElementById('dynamic-favicon');
                        if (favicon && branding.faviconUrl) {
                            favicon.href = branding.faviconUrl;
                        }
                        
                        // Update page title
                        if (branding.applicationName) {
                            document.title = branding.applicationName;
                        }
                        
                        console.log('Branding loaded:', branding.applicationName);
                    } else {
                        console.warn('Failed to load branding, using defaults');
                    }
                } catch (error) {
                    console.warn('Error loading branding, using defaults:', error);
                }
            }
            
            // Load branding when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadBranding);
            } else {
                loadBranding();
            }
        })();
    </script>

    <!-- Blazor runtime bootstrap (deferred until server health check is reachable) -->
    <script>
        (function () {
            const HEALTH_PATH = "api/v1/health";
            const RETRY_DELAY_MS = 4000;
            const REQUEST_TIMEOUT_MS = 5000;
            const PROGRESS_CAP = 95;
            const PROGRESS_STEP = 5;

            function normalizeUrl(url) {
                const trimmed = (url || "").trim();
                if (!trimmed) return "";
                return trimmed.endsWith("/") ? trimmed : `${trimmed}/`;
            }

            function resolveServerBaseUrl() {
                try {
                    const local = normalizeUrl(localStorage.getItem("ef_server_url"));
                    if (local) return local;
                } catch (e) { /* localStorage unavailable */ }

                return normalizeUrl(window.location.origin);
            }

            function setSplashStatus(text, percent) {
                document.documentElement.style.setProperty("--blazor-load-percentage-text", `"${text}"`);
                document.documentElement.style.setProperty("--blazor-load-percentage", `${Math.max(0, Math.min(100, percent))}%`);
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function isServerReachable(healthUrl) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

                try {
                    const response = await fetch(healthUrl, {
                        method: "GET",
                        cache: "no-store",
                        signal: controller.signal
                    });
                    return response.ok;
                } catch {
                    return false;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function waitForServerReady() {
                const baseUrl = resolveServerBaseUrl();
                const healthUrl = new URL(HEALTH_PATH, baseUrl).toString();
                let visualProgress = 0;

                while (true) {
                    setSplashStatus("Verifica connessione server...", visualProgress);

                    if (await isServerReachable(healthUrl)) {
                        setSplashStatus("Connessione stabilita, avvio applicazione...", 100);
                        return;
                    }

                    visualProgress = Math.min(PROGRESS_CAP, visualProgress + PROGRESS_STEP);
                    await sleep(RETRY_DELAY_MS);
                }
            }

            function loadBlazorRuntime() {
                return new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    script.src = "_framework/blazor.webassembly.js";
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            (async function bootstrapAfterHealthCheck() {
                try {
                    await waitForServerReady();
                    await loadBlazorRuntime();
                } catch (error) {
                    console.error("[PRYM] Bootstrap pre-check failed:", error);
                    setSplashStatus("Errore inizializzazione. Riprova...", 0);
                }
            })();
        })();
    </script>

    <script>
        // Helper function for downloading files from client-side
        window.downloadFile = function (filename, contentType, content) {
            const blob = new Blob([content], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
